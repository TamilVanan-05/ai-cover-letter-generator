version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=mysql+pymysql://cover_user:cover_password@db:3306/cover_letter_db
      - SECRET_KEY=prod-secret-key-should-be-random-in-deployment
      - JWT_SECRET_KEY=prod-jwt-secret-key-should-be-random-in-deployment
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
    volumes:
      - .:/app

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cover_letter_db
      MYSQL_USER: cover_user
      MYSQL_PASSWORD: cover_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
