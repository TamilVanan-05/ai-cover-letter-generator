name: Deploy to Render

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Trigger Render Deploy Hook
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Deploy via Webhook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Triggering Render deployment..."
            curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "Skipping deploy hook check: RENDER_DEPLOY_HOOK_URL secret is not set in GitHub repository settings."
          fi
